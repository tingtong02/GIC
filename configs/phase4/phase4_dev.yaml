{
  "defaults": [
    "../base.yaml",
    "../paths.yaml",
    "datasets/graph_dataset_default.yaml",
    "models/mlp_baseline.yaml",
    "models/gcn_baseline.yaml",
    "models/graphsage_baseline.yaml",
    "models/gat_baseline.yaml",
    "eval/baseline_eval.yaml"
  ],
  "project": {
    "stage": "phase_4",
    "profile": "phase4_dev"
  },
  "runtime": {
    "mode": "development",
    "command": "graph-build-samples"
  },
  "data": {
    "registry_root": "data/registry"
  },
  "training": {
    "batch_size": 8,
    "epochs": 25,
    "lr": 0.001,
    "weight_decay": 0.0,
    "seed": 42
  },
  "reporting": {
    "training_epochs": 4,
    "compare_split": "test",
    "ablation_models": ["mlp", "gcn"],
    "sparsity_rates": [0.3, 0.7, 0.9],
    "run_feature_ablations": true
  }
}
